services:
  - type: web
    name: deeptutor-backend
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn src.api.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.0"
      - key: BACKEND_PORT
        value: "8001"
      - key: LLM_BINDING
        sync: false
      - key: LLM_MODEL
        sync: false
      - key: LLM_API_KEY
        sync: false
      - key: LLM_HOST
        sync: false
      - key: EMBEDDING_BINDING
        sync: false
      - key: EMBEDDING_MODEL
        sync: false
      - key: EMBEDDING_API_KEY
        sync: false
      - key: EMBEDDING_HOST
        sync: false
      - key: EMBEDDING_DIMENSION
        sync: false
      - key: SEARCH_PROVIDER
        sync: false
      - key: SEARCH_API_KEY
        sync: false
